<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">

        <!-- HEADER -->
        <div class="header">
            <h3>Chat 💬</h3>
        </div>

        <!-- MESSAGES -->
        <div class="messages">
            <div class="msg left">Hello!</div>
            <div class="msg right">Hi, how are you?</div>
            <div class="msg left">I'm good!</div>
        </div>

        <!-- INPUT -->
        <div class="input-box">
            <input type="text" placeholder="Type a message...">
            <button>Send</button>
        </div>

    </div>

</body>
</html>
